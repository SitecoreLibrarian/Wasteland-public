<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASTELAND: ZERO HOUR</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@300;400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0a0a08;
  --bg2:         #111109;
  --bg3:         #1a1a14;
  --panel:       #14140f;
  --border:      #2a2a1e;
  --border2:     #3a3a28;
  --amber:       #d4820a;
  --amber-bright:#f0a020;
  --amber-dim:   #7a4a06;
  --amber-glow:  rgba(212,130,10,0.15);
  --green:       #2a6e2a;
  --green-bright:#4caf50;
  --red:         #8b1a1a;
  --red-bright:  #e53935;
  --blue:        #1a3a6e;
  --blue-bright: #42a5f5;
  --text:        #c8c0a0;
  --text-dim:    #7a7060;
  --text-bright: #e8e0c0;
  --hp-color:    #4caf50;
  --en-color:    #42a5f5;
  --poison-color:#9c27b0;
  --scan-line: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
  
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCANLINE OVERLAY ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: var(--scan-line);
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ══════════════════════════════════════════════
   LOADING / BOOT SCREEN
══════════════════════════════════════════════ */
#screen-boot {
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.boot-container {
  width: min(600px, 95vw);
  border: 1px solid var(--amber-dim);
  padding: 40px;
  background: var(--panel);
  position: relative;
}
.boot-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(212,130,10,0.04) 0%, transparent 70%);
  pointer-events: none;
}
.boot-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: clamp(28px, 6vw, 52px);
  color: var(--amber);
  text-transform: uppercase;
  letter-spacing: 8px;
  text-shadow: 0 0 30px rgba(212,130,10,0.5);
  margin-bottom: 4px;
  text-align: center;
}
.boot-subtitle {
  font-size: 11px;
  color: var(--amber-dim);
  letter-spacing: 6px;
  text-align: center;
  margin-bottom: 32px;
  text-transform: uppercase;
}
.boot-log {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 2;
  min-height: 120px;
  margin-bottom: 24px;
  border-left: 2px solid var(--amber-dim);
  padding-left: 12px;
}
.boot-log .ok { color: var(--green-bright); }
.boot-log .err { color: var(--red-bright); }
.boot-log .cursor { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
.boot-btn {
  width: 100%;
  padding: 14px;
  background: transparent;
  border: 1px solid var(--amber);
  color: var(--amber-bright);
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
}
.boot-btn:hover { background: var(--amber-glow); text-shadow: 0 0 10px var(--amber); }

/* ══════════════════════════════════════════════
   CHARACTER CREATION
══════════════════════════════════════════════ */
#screen-create {
  background: var(--bg);
  padding: 20px;
  align-items: center;
}
.create-wrap {
  width: min(720px, 100%);
}
.create-header {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 6px;
  color: var(--amber-dim);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.create-step-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 700;
  color: var(--amber);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border2);
  padding-bottom: 12px;
}
.create-section { margin-bottom: 20px; }

/* Name input */
.name-input-wrap { position: relative; }
.name-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-bottom: 2px solid var(--amber-dim);
  color: var(--text-bright);
  font-family: 'Oswald', sans-serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 2px;
  outline: none;
  transition: border-color 0.2s;
}
.name-input:focus { border-bottom-color: var(--amber); }
.name-input::placeholder { color: var(--text-dim); }

/* Background cards */
.bg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.bg-card {
  padding: 14px;
  border: 1px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.bg-card:hover { border-color: var(--amber-dim); background: var(--bg3); }
.bg-card.selected { border-color: var(--amber); background: var(--amber-glow); }
.bg-card-icon { font-size: 24px; margin-bottom: 6px; }
.bg-card-name { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 600; color: var(--amber); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
.bg-card-desc { font-family: 'Special Elite', serif; font-size: 11px; color: var(--text-dim); line-height: 1.6; }
.bg-card-flavor { font-size: 10px; color: var(--amber-dim); font-style: italic; margin-top: 6px; }
.bg-card-bonuses { margin-top: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
.bg-bonus-tag { font-size: 9px; padding: 2px 6px; border: 1px solid var(--amber-dim); color: var(--amber-dim); letter-spacing: 1px; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-bottom: 12px; }
.stat-row {
  border: 1px solid var(--border);
  background: var(--panel);
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.stat-label { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px; color: var(--amber-dim); }
.stat-full-name { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }
.stat-controls { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
.stat-btn {
  width: 24px; height: 24px;
  background: transparent; border: 1px solid var(--border2);
  color: var(--amber); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.stat-btn:hover:not(:disabled) { border-color: var(--amber); background: var(--amber-glow); }
.stat-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.stat-val { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 600; color: var(--amber-bright); min-width: 24px; text-align: center; }
.points-left { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
.points-left span { color: var(--amber-bright); }

/* Abilities select */
.ability-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.ability-card {
  padding: 12px;
  border: 1px solid var(--border);
  background: var(--panel);
  cursor: pointer;
  transition: all 0.2s;
  opacity: 0.5;
}
.ability-card.available { opacity: 1; }
.ability-card.selected { border-color: var(--amber); background: var(--amber-glow); opacity: 1; }
.ability-card:hover.available { border-color: var(--amber-dim); background: var(--bg3); }
.ability-icon { font-size: 20px; margin-bottom: 4px; }
.ability-name { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600; color: var(--amber); letter-spacing: 1px; text-transform: uppercase; }
.ability-cost { font-size: 9px; color: var(--blue-bright); letter-spacing: 1px; margin-top: 2px; }
.ability-desc { font-size: 10px; color: var(--text-dim); line-height: 1.5; margin-top: 4px; }
.ability-selected-count { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; margin-bottom: 8px; }
.ability-selected-count span { color: var(--amber); }

.create-nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 16px; }
.create-btn {
  padding: 12px 28px;
  background: transparent;
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  flex: 1;
}
.create-btn:hover { border-color: var(--amber); background: var(--amber-glow); }
.create-btn.primary { border-color: var(--amber); color: var(--amber-bright); }
.create-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Step indicator */
.step-indicator { display: flex; gap: 8px; margin-bottom: 20px; }
.step-dot { width: 8px; height: 8px; background: var(--border2); border-radius: 0; transition: all 0.3s; }
.step-dot.active { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
.step-dot.done { background: var(--amber-dim); }

/* Gear display */
.gear-preview {
  border: 1px solid var(--border);
  background: var(--panel);
  padding: 16px;
}
.gear-item { display: flex; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
.gear-item:last-child { border-bottom: none; }
.gear-item-icon { font-size: 20px; min-width: 28px; }
.gear-item-info {}
.gear-item-name { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--amber); letter-spacing: 1px; }
.gear-item-desc { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ══════════════════════════════════════════════
   MAIN GAME UI
══════════════════════════════════════════════ */
#screen-game {
  background: var(--bg);
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

.game-layout {
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  height: 100vh;
  max-width: 900px;
  margin: 0 auto;
  width: 100%;
  padding: 8px;
  gap: 6px;
}

/* Zone display */
.zone-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
  background: var(--panel);
  padding: 6px 12px;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-dim);
}
.zone-name { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--amber); letter-spacing: 3px; text-transform: uppercase; }
.zone-stats { display: flex; gap: 16px; }

/* Battle area */
.battle-area {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  overflow: hidden;
}

/* Enemy panel */
.enemy-panel {
  border: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  flex-direction: column;
  padding: 8px;
  overflow-y: auto;
  min-height: 0;
}
.enemy-panel-title {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--amber-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
#enemy-container { display: flex; flex-direction: column; gap: 4px; }
.enemy-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg3);
}
.enemy-row:hover:not(.dead) { border-color: var(--amber-dim); }
.enemy-row.targeted { border-color: var(--amber); background: var(--amber-glow); }
.enemy-row.dead { opacity: 0.2; cursor: default; filter: grayscale(1); }
.enemy-emoji { font-size: 20px; min-width: 28px; text-align: center; }
.enemy-info { flex: 1; min-width: 0; }
.enemy-name-row { display: flex; justify-content: space-between; align-items: center; }
.enemy-name { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px; color: var(--text-bright); text-transform: uppercase; }
.enemy-hp-text { font-size: 9px; color: var(--text-dim); }
.enemy-hp-bar { height: 3px; background: var(--border); margin-top: 3px; }
.enemy-hp-fill { height: 100%; background: var(--red-bright); transition: width 0.3s; }
.enemy-status { font-size: 9px; color: var(--text-dim); margin-top: 2px; display: flex; gap: 4px; }
.status-badge { padding: 1px 4px; font-size: 8px; letter-spacing: 1px; }
.status-badge.stunned { background: rgba(255,193,7,0.2); color: #ffc107; }
.status-badge.poisoned { background: rgba(156,39,176,0.2); color: #ce93d8; }
.status-badge.bleeding { background: rgba(229,57,53,0.2); color: var(--red-bright); }
.enemy-target-arrow { font-size: 10px; color: var(--amber); min-width: 10px; }

/* Party panel */
.party-panel {
  border: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  flex-direction: column;
  padding: 8px;
  overflow-y: auto;
  min-height: 0;
}
.party-panel-title {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--amber-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.party-member-row {
  padding: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  margin-bottom: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.party-member-row:last-child { margin-bottom: 0; }
.party-member-row.active { border-color: var(--amber); background: var(--amber-glow); }
.party-member-row.dead { opacity: 0.3; cursor: default; }
.party-member-row.acted { border-color: var(--green); }
.party-member-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.party-member-name { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 1px; color: var(--amber-bright); text-transform: uppercase; }
.party-member-class { font-size: 9px; color: var(--text-dim); letter-spacing: 2px; }
.party-member-tag { font-size: 8px; letter-spacing: 1px; padding: 1px 6px; }
.party-member-tag.acting { background: rgba(212,130,10,0.2); color: var(--amber); }
.party-member-tag.done { background: rgba(76,175,80,0.2); color: var(--green-bright); }
.party-member-tag.fallen { background: rgba(229,57,53,0.2); color: var(--red-bright); }
.member-bars { display: flex; flex-direction: column; gap: 3px; }
.member-bar-row { display: flex; align-items: center; gap: 6px; }
.member-bar-label { font-size: 8px; color: var(--text-dim); letter-spacing: 1px; min-width: 20px; }
.member-bar { flex: 1; height: 4px; background: var(--border); border-radius: 0; overflow: hidden; }
.member-bar-fill { height: 100%; transition: width 0.4s; border-radius: 0; }
.member-bar-fill.hp { background: var(--hp-color); }
.member-bar-fill.en { background: var(--en-color); }
.member-bar-val { font-size: 8px; color: var(--text-dim); min-width: 32px; text-align: right; }

/* Actions panel */
.actions-panel {
  border: 1px solid var(--border);
  background: var(--panel);
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.actions-row { display: flex; gap: 6px; }
.action-btn {
  flex: 1;
  padding: 10px 8px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}
.action-btn:hover:not(:disabled) { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.action-btn.attack { border-color: var(--red); color: var(--red-bright); }
.action-btn.attack:hover:not(:disabled) { background: rgba(139,26,26,0.2); }
.action-btn.flee { border-color: var(--border2); }
.items-display { display: flex; gap: 6px; flex-wrap: wrap; }
.item-chip {
  padding: 4px 10px;
  border: 1px solid var(--border2);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.15s;
}
.item-chip:hover { border-color: var(--amber-dim); color: var(--text); }

/* Turn banner */
.turn-banner {
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 6px;
  text-transform: uppercase;
  padding: 5px;
  border: 1px solid var(--border);
}
.turn-banner.player-turn { color: var(--amber); border-color: var(--amber-dim); background: rgba(212,130,10,0.05); }
.turn-banner.enemy-turn { color: var(--red-bright); border-color: var(--red); background: rgba(139,26,26,0.1); }

/* Message log */
.message-log {
  border: 1px solid var(--border);
  background: var(--bg2);
  padding: 8px 10px;
  height: 110px;
  overflow-y: auto;
  font-size: 11px;
  line-height: 1.8;
  display: flex;
  flex-direction: column-reverse;
}
.log-line { }
.log-line.attack { color: var(--red-bright); }
.log-line.enemy  { color: #ff8a65; }
.log-line.ability { color: var(--blue-bright); }
.log-line.heal   { color: var(--green-bright); }
.log-line.loot   { color: var(--amber-bright); }
.log-line.system { color: var(--text-dim); font-style: italic; }
.log-line.death  { color: var(--red-bright); opacity: 0.7; }
.log-line.warn   { color: #ffc107; }

/* ══════════════════════════════════════════════
   OVERLAYS
══════════════════════════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 500;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.open { display: flex; }

/* Ability menu overlay */
#overlay-abilities .ability-menu {
  width: min(600px, 100%);
  border: 1px solid var(--amber-dim);
  background: var(--panel);
  padding: 20px;
}
.overlay-title {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 5px;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.ability-menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px; margin-bottom: 14px; }
.ability-menu-btn {
  padding: 10px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.ability-menu-btn:hover:not(:disabled) { border-color: var(--amber-dim); background: var(--amber-glow); }
.ability-menu-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.amenu-icon { font-size: 18px; }
.amenu-name { font-family: 'Oswald', sans-serif; font-size: 11px; color: var(--amber); letter-spacing: 1px; text-transform: uppercase; margin: 4px 0 2px; }
.amenu-cost { font-size: 9px; color: var(--blue-bright); letter-spacing: 1px; }
.amenu-desc { font-size: 9px; color: var(--text-dim); line-height: 1.5; margin-top: 3px; }
.overlay-close {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: 'Oswald', sans-serif;
  font-size: 12px;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.15s;
}
.overlay-close:hover { border-color: var(--red); color: var(--red-bright); }

/* Heal target sub-menu */
#heal-target-list { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
.heal-target-btn {
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.heal-target-btn:hover:not(:disabled) { border-color: var(--green-bright); color: var(--green-bright); }
.heal-target-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Victory / Death overlays */
.big-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.96);
  z-index: 600;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.big-overlay.open { display: flex; }
.big-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: clamp(32px, 8vw, 64px);
  letter-spacing: 8px;
  text-transform: uppercase;
  text-shadow: 0 0 40px currentColor;
  margin-bottom: 8px;
}
.big-title.victory { color: var(--amber); }
.big-title.defeat  { color: var(--red-bright); }
.big-sub {
  font-family: 'Special Elite', serif;
  font-size: 14px;
  color: var(--text-dim);
  text-align: center;
  max-width: 440px;
  line-height: 1.8;
  margin-bottom: 20px;
  font-style: italic;
}

/* Victory party cards */
.victory-party-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; max-width: 560px; width: 100%; }
.victory-member {
  border: 1px solid var(--border2);
  background: var(--panel);
  padding: 10px 14px;
  min-width: 110px;
  flex: 1;
}
.victory-member.fallen { border-color: var(--red); opacity: 0.5; }
.v-name { font-family: 'Oswald', sans-serif; font-size: 11px; color: var(--amber); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.v-bar-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.v-bar-label { font-size: 8px; color: var(--text-dim); min-width: 18px; letter-spacing: 1px; }
.v-bar { flex: 1; height: 4px; background: var(--border); }
.v-bar-fill { height: 100%; }
.v-bar-fill.hp { background: var(--hp-color); }
.v-bar-fill.en { background: var(--en-color); }
.v-bar-val { font-size: 8px; color: var(--text-dim); min-width: 30px; text-align: right; }
.victory-gains {
  display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 2px;
  color: var(--text-dim); border-top: 1px solid var(--border);
  padding-top: 14px; margin-bottom: 20px;
}
.victory-gains span { color: var(--amber-bright); }

.big-btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
.big-btn {
  padding: 14px 28px;
  background: transparent;
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}
.big-btn:hover { border-color: var(--amber); background: var(--amber-glow); }
.big-btn.danger { border-color: var(--red); color: var(--red-bright); }
.big-btn.danger:hover { background: rgba(139,26,26,0.2); }

/* Camp overlay */
#overlay-camp {
  background: rgba(0,0,0,0.97);
}
.camp-panel {
  width: min(480px, 100%);
  border: 1px solid var(--amber-dim);
  background: var(--panel);
  padding: 20px;
}
.camp-title {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 5px;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.camp-sub { font-family: 'Special Elite', serif; font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 16px; letter-spacing: 1px; }
.camp-actions-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.camp-action-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  width: 100%;
}
.camp-action-btn:hover:not(:disabled) { border-color: var(--amber-dim); background: var(--amber-glow); }
.camp-action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.camp-action-btn.danger { border-color: var(--red); }
.camp-action-btn.danger:hover { background: rgba(139,26,26,0.15); }
.camp-icon { font-size: 22px; min-width: 28px; }
.camp-label { font-family: 'Oswald', sans-serif; font-size: 12px; color: var(--amber); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 2px; }
.camp-desc { font-size: 10px; color: var(--text-dim); font-style: italic; }
.camp-result {
  min-height: 56px;
  font-size: 11px;
  line-height: 1.9;
  color: var(--text-dim);
  border-top: 1px solid var(--border);
  padding-top: 12px;
}

/* Event overlay */
#overlay-event .event-panel {
  width: min(480px, 100%);
  border: 1px solid var(--border2);
  background: var(--panel);
  padding: 24px;
  text-align: center;
}
.event-icon { font-size: 56px; margin-bottom: 12px; filter: drop-shadow(0 0 20px rgba(212,130,10,0.4)); }
.event-title {
  font-family: 'Oswald', sans-serif;
  font-size: clamp(18px, 4vw, 28px);
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.event-desc { font-family: 'Special Elite', serif; font-size: 13px; color: var(--text-dim); line-height: 1.8; margin-bottom: 14px; font-style: italic; }
.event-effects { font-size: 11px; line-height: 2; color: var(--text-dim); margin-bottom: 16px; }
.event-btn {
  padding: 12px 32px;
  background: transparent;
  border: 1px solid var(--amber-dim);
  color: var(--amber);
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.event-btn:hover { border-color: var(--amber); background: var(--amber-glow); }

/* Animations */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
@keyframes flashRed {
  0%,100% { filter: none; }
  50% { filter: brightness(0.5) sepia(1) saturate(5); }
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.shake { animation: shake 0.3s ease; }
.flash-red { animation: flashRed 0.3s ease; }
.pulse { animation: pulse 1.5s ease infinite; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); }
</style>
</head>
<body>

<!-- ══ BOOT SCREEN ══ -->
<div class="screen active" id="screen-boot">
  <div class="boot-container">
    <div class="boot-title">WASTELAND</div>
    <div class="boot-subtitle">Zero Hour</div>
    <div class="boot-log" id="boot-log"></div>
    <button class="boot-btn" id="boot-start-btn" onclick="showCharCreate()">[ INITIALIZE SURVIVOR ]</button>
  </div>
</div>

<!-- ══ CHARACTER CREATION ══ -->
<div class="screen" id="screen-create">
  <div class="create-wrap" id="create-wrap">
    <div style="padding:16px 0 8px;">
      <div class="create-header">SURVIVOR REGISTRATION</div>
      <div class="step-indicator" id="step-indicator"></div>
    </div>
    <div id="create-content"></div>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="screen-game">
  <div class="game-layout">
    <!-- Zone bar -->
    <div class="zone-bar">
      <div class="zone-name" id="zone-name">THE OUTSKIRTS</div>
      <div class="zone-stats">
        <span>KILLS: <span id="stat-kills" style="color:var(--amber)">0</span></span>
        <span>XP: <span id="stat-xp" style="color:var(--amber)">0</span></span>
        <span>CAPS: <span id="stat-caps" style="color:var(--amber)">0</span></span>
      </div>
    </div>

    <!-- Battle area -->
    <div class="battle-area">
      <!-- Enemies -->
      <div class="enemy-panel">
        <div class="enemy-panel-title">◈ HOSTILES</div>
        <div id="enemy-container"></div>
      </div>
      <!-- Party -->
      <div class="party-panel">
        <div class="party-panel-title">◈ SQUAD</div>
        <div id="party-container"></div>
      </div>
    </div>

    <!-- Turn banner + actions -->
    <div>
      <div class="turn-banner player-turn" id="turn-banner">◈ YOUR TURN ◈</div>
      <div class="actions-panel" style="margin-top:6px;">
        <div class="actions-row">
          <button class="action-btn attack" id="btn-attack" onclick="playerAction('attack')">⚔ ATTACK</button>
          <button class="action-btn" id="btn-ability" onclick="openAbilityMenu()">◈ ABILITY</button>
          <button class="action-btn" id="btn-item" onclick="useItem()">🎒 ITEM</button>
          <button class="action-btn flee" id="btn-flee" onclick="playerAction('flee')">↩ FLEE</button>
        </div>
        <div class="items-display" id="items-display"></div>
      </div>
    </div>

    <!-- Message log -->
    <div class="message-log" id="message-log"></div>
  </div>
</div>

<!-- ══ ABILITY MENU OVERLAY ══ -->
<div class="overlay" id="overlay-abilities">
  <div class="ability-menu">
    <div class="overlay-title">◈ ABILITIES</div>
    <div class="ability-menu-grid" id="ability-menu-grid"></div>
    <div id="heal-target-wrap" style="display:none">
      <div style="font-size:10px;color:var(--amber-dim);letter-spacing:2px;margin-bottom:6px;">SELECT TARGET:</div>
